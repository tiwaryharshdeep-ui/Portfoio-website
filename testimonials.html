    <!-- Main Content -->
    <main class="main-content">
        <section id="testimonials">
            <div class="container">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 class="section-title">Testimonials</h2>
                    <button id="add-test-btn" class="btn btn-primary glow-effect" style="display: none; padding: 0.5rem 1rem; font-size: 0.9rem;">+ Add Testimonial</button>
                </div>
                <div class="testimonials-grid grid-2" id="testimonials-container">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

        <!-- Add Testimonial Modal -->
        <div id="add-test-modal" class="modal">
            <div class="modal-content card card-glow" style="max-width: 500px;">
                <span class="close-modal close-test-modal">&times;</span>
                <h3>Add New Testimonial</h3>
                <form id="add-test-form" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                    <input type="text" id="new-test-author" placeholder="Author Name (e.g. Jane Doe)" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-color);">
                    <input type="text" id="new-test-role" placeholder="Role (e.g. CEO)" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-color);">
                    <input type="text" id="new-test-company" placeholder="Company (e.g. Tech Corp)" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-color);">
                    <textarea id="new-test-content" placeholder="Testimonial Text" required rows="4" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: var(--text-color);"></textarea>
                    <button type="submit" class="btn btn-primary">Save Testimonial</button>
                </form>
            </div>
        </div>
    </main>

    <!-- JS Scripts -->
    <script src="js/data.js"></script>
